version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/dockerfiles/Dockerfile
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: devops_autopilot
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dev-token
      INFLUXDB_ORG: dev-org
      INFLUXDB_BUCKET: devops-metrics
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      - postgres
      - influxdb
    command: bash -lc "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devops_autopilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: dev
      DOCKER_INFLUXDB_INIT_PASSWORD: devdevdev
      DOCKER_INFLUXDB_INIT_ORG: dev-org
      DOCKER_INFLUXDB_INIT_BUCKET: devops-metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
    volumes:
      - influxdb2:/var/lib/influxdb2

volumes:
  pgdata: {}
  influxdb2: {}
