name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt

      - name: Static compile check
        run: |
          python -m compileall -q backend routers main.py main_demo.py run_demo.py

      - name: Import smoke test
        run: |
          python - <<'PY'
          from backend.core.settings import Settings
          s = Settings()
          # Validate postgres DSN & influx config from sample YAML
          print('DSN:', s.postgres_dsn())
          inf = s.influx_config()
          print('INFLUX:', inf[0])
          print('OK')
          PY
