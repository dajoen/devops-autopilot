name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies (minimal)
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
          poetry install --only=main,minimal --no-root

      - name: Static compile check
        run: |
          poetry run python -m compileall -q backend routers main.py main_demo.py run_demo.py

      - name: Import smoke test
        run: |
          poetry run python - <<'PY'
          from backend.core.settings import Settings
          s = Settings()
          # Validate postgres DSN & influx config from sample YAML
          print('DSN:', s.postgres_dsn())
          inf = s.influx_config()
          print('INFLUX:', inf[0])
          print('OK')
          PY
